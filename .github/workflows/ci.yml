# GitHub mirror CI — validates mirrored main and GitHub-side PRs.

name: GrayJay Plugin CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  BUN_VERSION: 1.3.14

jobs:
  build-and-test:
    if: ${{ github.server_url == 'https://github.com' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Verify build output
        run: |
          test -s dist/MeansTvConfig.json
          test -s dist/MeansTvScript.js
          test -s dist/MeansTvLogo.jpg
